<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Workout Player</title>
  <link rel="manifest" href="./manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: #F5F2EC;
    }

    *:focus-visible {
      outline: 2px solid #2d2d2d;
      outline-offset: 4px;
      border-radius: 4px;
    }

    button:focus-visible {
      outline: 2px solid #00c9a7;
    }

    /* Theme transition — applied during switch, removed after so hover stays instant */
    .theme-transitioning,
    .theme-transitioning * {
      transition:
        background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
        color            0.5s cubic-bezier(0.4, 0, 0.2, 1),
        border-color     0.5s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow       0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes checkDraw {
      from {
        stroke-dashoffset: 48;
      }

      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes gentlePulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    @keyframes confettiDrift {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.02);
      }
    }

    @keyframes springIn {
      0% { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes particleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.3);
      }
    }

    @keyframes slabFlood {
      0% {
        height: 52px;
        border-radius: 16px 16px 0 0;
      }

      100% {
        height: 100vh;
        border-radius: 0;
      }
    }

    @keyframes floodFadeOut {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    ::selection {
      background: rgba(0, 201, 167, 0.2);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(26, 26, 26, 0.15);
      border-radius: 4px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── CONFIG ────────────────────────────────────────────────────────
    const WEBHOOK_URL = "https://hook.eu2.make.com/zvc9dljmjafaub5v0xln6jkg2bifq68r";
    const WEBHOOK_NOTES_URL = "https://hook.eu2.make.com/j4di64bhdk11xk1rlug37aamc3m7zu1f";

    // ─── DESIGN TOKENS ────────────────────────────────────────────────
    const EMOJI_MAP = {
      "💪": "fitness_center",
      "🧘": "self_improvement",
      "🏃": "directions_run",
      "🧗": "terrain",
      "🤸": "sports_gymnastics",

      "⏱️": "timer",

      "😌": "sentiment_satisfied",
      "😮‍💨": "air", // or something similar
    };
    function getIcon(emoji) { return EMOJI_MAP[emoji] || null; }

    const C = {
      bg: "#F5F2EC",
      surface: "#EDEAE2",
      surfaceHigh: "#E5E1D8",
      surfaceHigher: "#DAD6CC",
      onBg: "#1A1A1A",
      sub: "#3D3D3D",
      muted: "#888580",
      faint: "rgba(26,26,26,0.10)",
      faintHover: "rgba(26,26,26,0.16)",
      danger: "#E05050",
      dangerDim: "rgba(224,80,80,0.10)",
      success: "#7DCE54",
      primary: "#00C9A7",
      primaryDim: "rgba(0,201,167,0.12)",
      primaryGlow: "rgba(0,201,167,0.06)",
      accent: "#FFB347",
      accentDim: "rgba(255,179,71,0.12)",

      restDim: "rgba(199,125,255,0.12)",
      onPrimary: "#FFFFFF",
      onAccent: "#1A1400",
    };
    // 7-color exercise palette (bold, saturated)
    const EXERCISE_COLORS = [
      "#FF6B6B",  // 0 Coral
      "#FFB347",  // 1 Amber
      "#7DCE54",  // 2 Lime
      "#00C9A7",  // 3 Teal
      "#4CC9F0",  // 4 Sky
      "#C77DFF",  // 5 Lavender
      "#FF6F91",  // 6 Rose
    ];
    // ─── SEED GEN ──────────────────────────────────────────────────────
    function xmur3(str) {
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = h << 13 | h >>> 19;
      }
      return function () {
        h = Math.imul(h ^ h >>> 16, 2246822507);
        h = Math.imul(h ^ h >>> 13, 3266489909);
        return (h ^= h >>> 16) >>> 0;
      }
    }
    function sfc32(a, b, c, d) {
      return function () {
        a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
        let t = (a + b | 0) + d | 0;
        d = d + 1 | 0;
        a = b ^ b >>> 9;
        b = c + (c << 3) | 0;
        c = c << 21 | c >>> 11;
        c = c + t | 0;
        return (t >>> 0) / 4294967296;
      }
    }

    // 5 M3E shape names (cycle by set index)
    const SHAPE_NAMES = ["diamond", "gem", "cookie", "flower", "daisy"];

    // Procedurally shift the base exercise color using the same seed mechanics as the trees
    function exerciseColor(stepIndex) {
      if (!window.THREE) return EXERCISE_COLORS[stepIndex % EXERCISE_COLORS.length];
      const baseHex = EXERCISE_COLORS[stepIndex % EXERCISE_COLORS.length];
      const seedGen = xmur3("tree_" + stepIndex);
      const rand = sfc32(seedGen(), seedGen(), seedGen(), seedGen());
      const hueShift = (rand() - 0.5) * 0.4;
      const satShift = (rand() - 0.5) * 0.4;
      const lightShift = (rand() - 0.5) * 0.2;

      const color = new window.THREE.Color(baseHex);
      const hsl = {};
      color.getHSL(hsl);
      hsl.h = (hsl.h + hueShift + 1.0) % 1.0;
      hsl.s = Math.max(0, Math.min(1, hsl.s + satShift));
      hsl.l = Math.max(0, Math.min(1, hsl.l + lightShift));
      color.setHSL(hsl.h, hsl.s, hsl.l);
      return '#' + color.getHexString();
    }
    function makeTreeTheme(exColor, darkOverride = null) {
      if (!window.THREE) {
        return { bg: C.bg, light: true, trunk: [C.sub, C.muted], inner: [exColor, exColor], mid: [exColor, exColor], outer: [exColor, '#ffffff'], depth: 6, girth: 1.0, curve: 1.0, spread: 1.1, density: 1.0, dotSize: 1.2, wind: 1.0 };
      }
      const base = new window.THREE.Color(exColor);
      const hsl = {};
      base.getHSL(hsl);
      const col = (h, s, l) => '#' + new window.THREE.Color().setHSL(h, s, l).getHexString();
      const h = hsl.h, s = hsl.s, l = hsl.l;

      // Logic for dark theme override
      const isDark = darkOverride === "dark";
      const bg = isDark ? "#0A0A0A" : C.bg;
      
      return {
        bg: bg,
        light: !isDark,
        trunk: isDark ? [col(h, 0.1, 0.15), col(h, 0.15, 0.25)] : [col(h, 0.12, 0.20), col(h, 0.18, 0.30)],
        inner: [col(h, Math.min(s * 1.1, 1), Math.max(l * 0.5, 0.2)), col(h, Math.min(s, 1), Math.max(l * 0.62, 0.25))],
        mid:   [exColor, col((h + 0.025) % 1, s * 0.85, Math.min(l * 1.1, 0.75))],
        outer: [col(h, s * 0.55, Math.min(l + 0.22, 0.88)), col(h, s * 0.28, Math.min(l + 0.32, 0.93)), col((h + 0.04) % 1, s * 0.60, Math.min(l + 0.15, 0.85))],
        depth: 6, girth: 1.0, curve: 1.0, spread: 1.1, density: 1.1, dotSize: 1.3, wind: 1.0,
      };
    }
    function shapeName(setIndex) { return SHAPE_NAMES[setIndex % SHAPE_NAMES.length]; }

    // ─── TREE THEMES (7, mapped to exercise color palette) ────────────
    // light:true = pale bg (dark text), light:false = dark bg (white text)
    const TREE_THEMES = [
      { // 0 – Coral · Sunset & Embers
        bg: '#0B0D12', light: false,
        trunk: ['#1A1C24', '#3E4254', '#798198'], inner: ['#B83B1A', '#AA4A2E'],
        mid: ['#DE6E3F', '#E88B5A'], outer: ['#FFB58A', '#FFD8B8', '#F29672'],
        depth: 6, girth: 1.2, curve: 0.8, spread: 1.1, density: 1.2, dotSize: 1.5, wind: 0.8
      },
      { // 1 – Amber · Desert Acacia
        bg: '#FDF5E0', light: true,
        trunk: ['#4A2800', '#6D3B00'], inner: ['#8D6040', '#795040'],
        mid: ['#FF9100', '#FFB300'], outer: ['#FFD740', '#FFF5C0', '#FFB74D'],
        depth: 5, girth: 0.8, curve: 1.5, spread: 1.8, density: 0.6, dotSize: 0.8, wind: 1.2
      },
      { // 2 – Lime · Night Jungle
        bg: '#010D01', light: false,
        trunk: ['#0A1E04', '#193208'], inner: ['#1B5E20', '#2E7D32'],
        mid: ['#43A047', '#66BB6A'], outer: ['#A5D6A7', '#B9F6CA', '#69F0AE'],
        depth: 7, girth: 1.0, curve: 1.2, spread: 1.0, density: 1.5, dotSize: 2.0, wind: 0.6
      },
      { // 3 – Teal · Bioluminescent Deep Sea
        bg: '#00070A', light: false,
        trunk: ['#002030', '#003040'], inner: ['#005F6B', '#00838F'],
        mid: ['#00BCD4', '#26C6DA'], outer: ['#80DEEA', '#00E5FF', '#64FFDA'],
        depth: 6, girth: 0.7, curve: 2.0, spread: 1.5, density: 0.8, dotSize: 1.2, wind: 2.5
      },
      { // 4 – Sky · Arctic Winter
        bg: '#EBF5FB', light: true,
        trunk: ['#37474F', '#546E7A'], inner: ['#0277BD', '#0288D1'],
        mid: ['#4FC3F7', '#81D4FA'], outer: ['#B3E5FC', '#E8F7FF', '#FFFFFF'],
        depth: 5, girth: 1.0, curve: 1.0, spread: 0.6, density: 0.4, dotSize: 0.6, wind: 2.0
      },
      { // 5 – Lavender · Twilight Mystic
        bg: '#040008', light: false,
        trunk: ['#1A0033', '#2A0047'], inner: ['#4A148C', '#6A1B9A'],
        mid: ['#AB47BC', '#CE93D8'], outer: ['#E1BEE7', '#F0E0FF', '#C77DFF'],
        depth: 6, girth: 0.9, curve: 1.3, spread: 1.2, density: 1.0, dotSize: 1.0, wind: 1.5
      },
      { // 6 – Rose · Cherry Blossom
        bg: '#FFF0F4', light: true,
        trunk: ['#3E2723', '#4E342E'], inner: ['#880E4F', '#AD1457'],
        mid: ['#F06292', '#F48FB1'], outer: ['#FCE4EC', '#FFFFFF', '#FF80AB'],
        depth: 6, girth: 1.1, curve: 1.0, spread: 1.3, density: 1.8, dotSize: 1.5, wind: 0.9
      },
    ];

    // ─── TREE BACKGROUND (Three.js stippled plant, grows with timer) ──
    const _treeGenCache = {};
    function TreeBackground({ exerciseKey, themeIndex, duration, growing, startCompleted, customTheme, sceneType = "single" }) {
      const mountRef = useRef(null);
      const growRef = useRef(growing);
      const startCompletedRef = useRef(startCompleted);
      const durationRef = useRef(duration);

      useEffect(() => { growRef.current = growing; }, [growing]);
      useEffect(() => { startCompletedRef.current = startCompleted; }, [startCompleted]);
      useEffect(() => { durationRef.current = duration; }, [duration]);

      useEffect(() => {
        const mount = mountRef.current;
        if (!mount || !window.THREE) return;
        const T = window.THREE;
        const theme = customTheme || TREE_THEMES[themeIndex] || TREE_THEMES[0];

        // ── Seeded Random ──
        const seedGen = xmur3("tree_" + exerciseKey);
        const rand = sfc32(seedGen(), seedGen(), seedGen(), seedGen());

        // ── Color parsing & Procedural Shift ──
        const isDarkTheme = !theme.light;
        const hueShift = (rand() - 0.5) * 0.4;
        const satShift = (rand() - 0.5) * 0.4;
        const lightShift = (rand() - 0.5) * 0.2;

        const shiftRGB = (baseHex, isTrunk = false) => {
          const color = new T.Color(baseHex);
          const hsl = {};
          color.getHSL(hsl);
          hsl.h = (hsl.h + hueShift + 1.0) % 1.0;
          hsl.s = T.MathUtils.clamp(hsl.s + satShift, 0, 1);
          let finalL = T.MathUtils.clamp(hsl.l + lightShift, 0, 1);

          // Ensure the trunk is never too dark to see on dark themes
          if (isDarkTheme && isTrunk && finalL < 0.25) {
            finalL = 0.25;
          }

          color.setHSL(hsl.h, hsl.s, finalL);
          return { r: color.r, g: color.g, b: color.b };
        };

        const pData = {
          trunk: theme.trunk.map(hex => shiftRGB(hex, true)),
          inner: theme.inner.map(hex => shiftRGB(hex, false)),
          mid: theme.mid.map(hex => shiftRGB(hex, false)),
          outer: theme.outer.map(hex => shiftRGB(hex, false)),
        };

        // ── Scene / Camera / Renderer ──
        const scene = new T.Scene();
        const W = mount.clientWidth, H = mount.clientHeight;
        const camera = new T.PerspectiveCamera(45, W / H, 0.1, 100);
        camera.position.set(0, 5, 24);
        camera.lookAt(0, 7, 0);

        const renderer = new T.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);

        // ── Particle material ──
        const cCv = document.createElement('canvas');
        cCv.width = cCv.height = 64;
        const cCtx = cCv.getContext('2d');
        cCtx.beginPath(); cCtx.arc(32, 32, 30, 0, Math.PI * 2);
        cCtx.fillStyle = '#fff'; cCtx.fill();
        const circleTex = new T.CanvasTexture(cCv);

        const baseSize = 0.11 * (theme.dotSize ?? 1.0);
        const mat = new T.PointsMaterial({
          size: baseSize, vertexColors: true, map: circleTex,
          alphaTest: 0.5, transparent: true,
          blending: T.NormalBlending,
          depthWrite: !isDarkTheme,
        });

        let shaderUniforms = null;
        mat.onBeforeCompile = shader => {
          shader.uniforms.uTime = { value: 0 };
          shader.uniforms.uPlantTime = { value: 0 };
          shader.uniforms.uWind = { value: theme.wind ?? 1.0 };
          shaderUniforms = shader.uniforms;
          shader.vertexShader = `
            attribute float aSizeMultiplier;
            attribute float aBirthTime;
            attribute float aType;
            uniform float uTime;
            uniform float uPlantTime;
            uniform float uWind;
            ${shader.vertexShader}
          `.replace('gl_PointSize = size;', `
            float age = max(0.0, uPlantTime - aBirthTime);
            float growthScale = clamp(age * 1.5, 0.0, 1.0);
            float bounce = (aType > 0.5) ? sin(clamp(age*4.0,0.0,3.14159))*0.2 : 0.0;
            float finalSize = size * aSizeMultiplier * (growthScale + bounce);
            if (age <= 0.0) finalSize = 0.0;
            gl_PointSize = finalSize;
          `).replace('#include <begin_vertex>', `
            #include <begin_vertex>
            float swayAmt = position.y * 0.04 * uWind;
            float waveX = sin(position.y*0.4 + position.z*0.3 + uTime*1.2);
            float waveZ = cos(position.y*0.4 + position.x*0.3 + uTime*1.5);
            float flutter = (aType > 0.5) ? sin(position.x*5.0+position.z*5.0+uTime*3.5)*0.02*max(0.0,position.y-1.0)*uWind : 0.0;
            transformed.x += waveX * swayAmt + flutter;
            transformed.z += waveZ * swayAmt + flutter;
          `);
        };

        // ── Tree params (Procedurally scaled) ──
        const oDepth = theme.depth ?? 6,
          oGirth = theme.girth ?? 1.0,
          oCurve = theme.curve ?? 1.0,
          oSpread = theme.spread ?? 1.0,
          oDensity = theme.density ?? 1.0;

        const DEPTH = Math.floor(rand() * 4) + 4; // 4 to 7 layers
        const GIRTH = oGirth * (rand() * 0.8 + 0.6); // 0.6x to 1.4x theme default
        const CURVE = oCurve * (rand() * 1.5 + 0.5); // 0.5x to 2.0x
        const SPREAD = oSpread * (rand() * 1.5 + 0.3); // 0.3x to 1.8x
        const FOLIAGE = rand() * 1.0 + 0.6; // 0.6x to 1.6x
        const DENSITY = oDensity * (rand() * 1.0 + 0.5); // 0.5x to 1.5x

        // ── Generation state ──
        let generatedData = [], totalPoints = 0,
          maxPlantTime = 1, currentPlantTime = 0,
          drawCount = 0, pointsMesh = null;

        const up = new T.Vector3(0, 1, 0);

        function buildCluster(center, radius, timeOffset) {
          const num = Math.floor(radius * 2000 * DENSITY);
          for (let i = 0; i < num; i++) {
            const u = rand(), v = rand();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            const r = radius * Math.cbrt(rand());
            const p = new T.Vector3(
              r * Math.sin(phi) * Math.cos(theta),
              r * Math.sin(phi) * Math.sin(theta) * 0.75,
              r * Math.cos(phi)
            ).add(center);
            const bucket = r > radius * 0.7 ? pData.outer
              : r > radius * 0.35 ? pData.mid : pData.inner;
            const color = bucket[Math.floor(rand() * bucket.length)];
            generatedData.push({
              x: p.x, y: p.y, z: p.z, r: color,
              time: timeOffset + (r / radius) * 10 + rand() * 2,
              size: rand() * 0.4 + 0.25, type: 1.0
            });
          }
        }

        function buildBranch(startPos, direction, length, depth, timeOffset, twistAngle) {
          if (depth === 0) {
            buildCluster(startPos, length * 0.5 * FOLIAGE, timeOffset + 2);
            return;
          }
          const endPos = new T.Vector3().copy(direction).multiplyScalar(length).add(startPos);
          const outward = new T.Vector3().crossVectors(direction, up).normalize();
          if (outward.lengthSq() < 0.001) outward.set(1, 0, 0);
          outward.applyAxisAngle(direction, twistAngle);
          const midPoint = new T.Vector3().lerpVectors(startPos, endPos, 0.5);

          // The base trunk should grow straight out of the ground organically, not tilted
          const actCurve = depth === DEPTH ? (CURVE * 0.1) : CURVE;
          const controlPos = midPoint.add(outward.clone().multiplyScalar(length * 0.2 * actCurve));
          const curve = new T.QuadraticBezierCurve3(startPos, controlPos, endPos);

          const numDots = Math.floor(length * 400 * DENSITY);
          const timeToH = length * 8;
          const baseR = ((depth * 0.04) + 0.02) * GIRTH;
          const tipR = (((depth - 1) * 0.04) + 0.02) * GIRTH;

          for (let i = 0; i < numDots; i++) {
            const t = i / numDots;
            const point = curve.getPoint(t);
            const tangent = curve.getTangent(t);
            const rad = T.MathUtils.lerp(baseR, tipR, t)
              * (depth === DEPTH && t < 0.15 ? 1.0 + (0.15 - t) * 8.0 : 1.0); // Flare out roots more aggressively at the very base

            let a1 = new T.Vector3().crossVectors(tangent, up).normalize();
            if (a1.lengthSq() < 0.001) a1.set(1, 0, 0);
            const a2 = new T.Vector3().crossVectors(tangent, a1).normalize();

            const angle = rand() * Math.PI * 2;
            const radP = Math.sqrt(rand());
            const p = point.clone()
              .add(a1.clone().multiplyScalar(Math.cos(angle) * rad * radP))
              .add(a2.clone().multiplyScalar(Math.sin(angle) * rad * radP));

            generatedData.push({
              x: p.x, y: p.y, z: p.z,
              r: pData.trunk[Math.floor(rand() * pData.trunk.length)],
              time: timeOffset + t * timeToH + radP * length * 10,
              size: rand() * 0.5 + 0.45, type: 0.0,
            });
          }

          const nextTime = timeOffset + timeToH;
          const mainDir = direction.clone().lerp(up, 0.2).normalize();
          buildBranch(endPos, mainDir, length * 0.85, depth - 1, nextTime, twistAngle + 2.4);

          const numLats = depth > 2 ? 2 : 1;
          for (let i = 0; i < numLats; i++) {
            const splitT = 0.4 + i * 0.35;
            if (splitT >= 1.0) continue;
            const splitP = curve.getPoint(splitT);
            const splitTgt = curve.getTangent(splitT);
            const twist = twistAngle + 2.4 + i * Math.PI;
            const lOut = new T.Vector3().crossVectors(splitTgt, up).normalize();
            if (lOut.lengthSq() < 0.001) lOut.set(1, 0, 0);
            lOut.applyAxisAngle(splitTgt, twist);
            const lDir = splitTgt.clone().lerp(lOut, 0.4 * SPREAD).normalize();
            buildBranch(splitP, lDir, length * 0.65, depth - 1,
              timeOffset + splitT * timeToH, twist);
          }
        }

        function buildGround() {
          const isForest = sceneType === "forest";

          for (let i = 0; i < num; i++) {
            const rad = isForest ? 28 : 10;
            const r2 = rad * Math.sqrt(rand()), t2 = rand() * Math.PI * 2;
            // Density falloff
            if (rand() > Math.pow(r2 / rad, 1.2)) {
              generatedData.push({
                x: r2 * Math.cos(t2), y: (rand() - 0.5) * 0.1,
                z: r2 * Math.sin(t2), r: pData.trunk[0],
                time: rand() * 5, size: rand() * 0.5 + 0.3, type: 0.0

            }
          }
        }

    // ─── AUDIO ──────────────────────────────────────────────────────────
    function makeAudio() {
      let ctx = null;
      let globalVol = 0.5;
      const ac = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
      const t = (freq, type, dur, vol = 0.2, delay = 0) => {
        try { 
          const c = ac(), o = c.createOscillator(), g = c.createGain(); 
          o.connect(g); g.connect(c.destination); o.type = type; o.frequency.value = freq; 
          const finalVol = vol * globalVol;
          g.gain.setValueAtTime(0, c.currentTime + delay); 
          g.gain.linearRampToValueAtTime(finalVol, c.currentTime + delay + 0.01); 
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur); 
          o.start(c.currentTime + delay); o.stop(c.currentTime + delay + dur + 0.05); 
        } catch { }
      };
      return {
        setVolume: (v) => { globalVol = v; },
        getVolume: () => globalVol,
        init: () => {
          try {
            const c = ac();
            const o = c.createOscillator();
            const g = c.createGain();
            o.connect(g);
            g.connect(c.destination);
            g.gain.value = 0;
            o.start(c.currentTime);
            o.stop(c.currentTime + 0.01);
          } catch(e) {}
        },
        tick: () => t(880, "sine", 0.06, 0.08),
        beep: () => t(660, "sine", 0.07, 0.1),
        ready: () => { t(523, "sine", 0.1, 0.15, 0); t(659, "sine", 0.1, 0.15, 0.14); },
        setDone: () => { t(523, "triangle", 0.22, 0.2, 0); t(659, "triangle", 0.22, 0.17, 0.06); t(784, "triangle", 0.22, 0.14, 0.12); },
        exDone: () => { t(523, "sine", 0.32, 0.22, 0); t(659, "sine", 0.32, 0.18, 0.07); t(784, "sine", 0.32, 0.15, 0.14); t(1046, "sine", 0.38, 0.1, 0.22); },
        allDone: () => [523, 659, 784, 1046, 1318].forEach((f, i) => t(f, "sine", 0.4, 0.16, i * 0.1)),

    function useSpring(target, k = 700, d = 70) {
      const [v, setV] = useState(target);
      const s = useRef({ x: target, v: 0 }); const r = useRef(null);
      useEffect(() => {
        const tick = () => { const { x, v } = s.current; const nv = (v + (target - x) * k / 10000) * (1 - d / 1000); const nx = x + nv; s.current = { x: nx, v: nv }; setV(nx); if (Math.abs(target - nx) > 0.0005 || Math.abs(nv) > 0.0005) r.current = requestAnimationFrame(tick); else { s.current = { x: target, v: 0 }; setV(target); } };
        r.current = requestAnimationFrame(tick); return () => cancelAnimationFrame(r.current);
      }, [target]); return v;
    }

    function m3ePoints(name, n = 128) {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const theta = (i / n) * Math.PI * 2;
        let r = 1;
        if (name === "diamond") {
          const ct = Math.abs(Math.cos(theta)), st = Math.abs(Math.sin(theta));
          r = (1 / Math.max(ct + st, 0.001)) / Math.SQRT2;
        } else if (name === "gem") {
          const ct = Math.pow(Math.abs(Math.cos(theta)), 2 / 3);
          const st = Math.pow(Math.abs(Math.sin(theta)), 2 / 3);
          r = (1 / Math.max(Math.pow(ct + st, 3 / 2), 0.001)) * 0.92;
        } else if (name === "cookie") {
          const ct = Math.sqrt(Math.abs(Math.cos(theta)));
          const st = Math.sqrt(Math.abs(Math.sin(theta)));
          r = (1 / Math.max(ct + st, 0.001)) * 0.88;
        } else if (name === "flower") {
          r = 0.55 + 0.45 * Math.abs(Math.cos(3 * theta));
        } else if (name === "daisy") {
          r = 0.6 + 0.4 * Math.abs(Math.cos(5 * theta));
        }
        pts.push({ x: Math.cos(theta) * r, y: Math.sin(theta) * r });
      }
      return pts;
    }

    const M3E_SHAPES = {};
    SHAPE_NAMES.forEach(n => { M3E_SHAPES[n] = m3ePoints(n, 128); });

    function lerpPoints(a, b, t) {
      return a.map((p, i) => ({ x: p.x + (b[i].x - p.x) * t, y: p.y + (b[i].y - p.y) * t }));

    function drawM3EPath(ctx, pts, cx, cy, r) {
      ctx.beginPath();
      pts.forEach((p, i) => {
        const px = cx + p.x * r, py = cy + p.y * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.closePath();
    }

          const s = sRef.current;
          const nv = (s.v + (1 - s.x) * 300 / 10000) * (1 - 12 / 1000);
          const nx = s.x + nv;
          sRef.current = { x: nx, v: nv };
          setMorphT(nx);
          if (Math.abs(1 - nx) > 0.001 || Math.abs(nv) > 0.001) {
            rafRef.current = requestAnimationFrame(tick);
          } else { sRef.current = { x: 1, v: 0 }; setMorphT(1); }
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [toName]);
      const fromPts = M3E_SHAPES[fromName] || M3E_SHAPES["cookie"];
      const toPts = M3E_SHAPES[toName] || M3E_SHAPES["cookie"];
      return lerpPoints(fromPts, toPts, morphT);
    }

    function useParticleBurst() {
      const [particles, setParticles] = useState([]);
      const triggerBurst = useCallback((color) => {
        const p = Array.from({ length: 20 }, (_, i) => {
          const angle = (i / 20) * Math.PI * 2 + Math.random() * 0.3;
          const speed = 80 + Math.random() * 120;
          return { id: Date.now() + i, color, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed, size: 6 + Math.random() * 8, duration: 0.5 + Math.random() * 0.4, delay: Math.random() * 0.1 };
        });
        setParticles(p);
        setTimeout(() => setParticles([]), 1200);
      }, []);
      return [particles, triggerBurst];
    }

    // ─── HELPERS ────────────────────────────────────────────────────────
    const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

    function calcTotalSecs(steps) { return steps.reduce((a, s) => a + s.duration * s.sets + s.restBetweenSets * Math.max(0, s.sets - 1), 0); }

    // ─── COMPONENTS ─────────────────────────────────────────────────────

    // Full-viewport M3E morphing shape backdrop
    function M3EBackdrop({ shapeName: toName, color, pulseKey }) {
      const canvasRef = useRef(null);
      const prevName = useRef(toName);
      const morphedPts = useMorphedShape(prevName.current, toName);
      useEffect(() => { prevName.current = toName; }, [toName]);

      const [pulseScale, setPulseScale] = useState(1.0);
      const pulseSpring = useSpring(pulseScale, 600, 60);
      useEffect(() => {
        setPulseScale(1.02);
        const t = setTimeout(() => setPulseScale(1.0), 80);
        return () => clearTimeout(t);
      }, [pulseKey]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const resize = () => {
          canvas.width = window.innerWidth * dpr;
          canvas.height = window.innerHeight * dpr;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
        };
        resize();
        window.addEventListener("resize", resize);
        return () => window.removeEventListener("resize", resize);
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const ctx = canvas.getContext("2d");
        const w = canvas.width / dpr;
        const h = canvas.height / dpr;
        ctx.save(); ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, w, h);
        const r = Math.min(w, h) * 0.40 * pulseSpring;
        drawM3EPath(ctx, morphedPts, w / 2, h / 2, r);
        ctx.fillStyle = color + "26"; // ~15% opacity
        ctx.fill();
        ctx.restore();
      }, [morphedPts, color, pulseSpring]);

      return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }} />;
    }

    // Radial particle burst (set completion)
    function ParticleBurstLayer({ particles }) {
      if (!particles.length) return null;
      return (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 5, overflow: "hidden" }}>
          {particles.map(p => (
            <div key={p.id} style={{
              position: "absolute", left: "50%", top: "50%",
              width: p.size, height: p.size, borderRadius: "50%",
              background: p.color,
              "--dx": p.dx + "px", "--dy": p.dy + "px",
              animation: `particleBurst ${p.duration}s cubic-bezier(0.2, 0, 0, 1) ${p.delay}s both`,
              transform: "translate(-50%, -50%)",

    // Small M3E cookie canvas for chip/card backgrounds
    function M3EChipCanvas({ width, height, color, opacity = 1, border = "transparent" }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, width, height);
        if (opacity <= 0 && (!border || border === "transparent")) return;
        const pts = M3E_SHAPES["cookie"];
        ctx.beginPath();
        pts.forEach((p, i) => {
          const px = width / 2 + p.x * (width / 2 - 2);
          const py = height / 2 + p.y * (height / 2 - 2);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        });
        ctx.closePath();
        if (opacity > 0) { ctx.globalAlpha = opacity; ctx.fillStyle = color; ctx.fill(); }
        if (border && border !== "transparent") {
          ctx.globalAlpha = 1; ctx.strokeStyle = border; ctx.lineWidth = 1.5; ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }, [width, height, color, opacity, border]);
      return <canvas ref={canvasRef} style={{ position: "absolute", inset: 0, width, height, pointerEvents: "none" }} />;
    }

        pts.forEach((p, i) => {

    // Journey bar: shows all exercises as segments (clarity: where am I?)
    function JourneyBar({ steps, currentIndex, phase, activeColor, onDark, currentTime, totalTime }) {
      const ac = activeColor || C.primary;
      const inactiveBg = onDark ? "rgba(255,255,255,0.12)" : C.faint;
      
      return (
        <div style={{ display: "flex", gap: 6, padding: "0 24px", width: "100%", maxWidth: "min(600px, 80vw)" }}>
          {steps.map((s, i) => {
            const done = i < currentIndex;
            const active = i === currentIndex;
            
            // Calculate progress for the active segment
            // We assume currentTime is counting DOWN from totalTime to 0
            let progress = 0;
            if (done) progress = 1;
            else if (active && totalTime > 0) {
              progress = Math.max(0, Math.min(1, (totalTime - currentTime) / totalTime));
            }

            return (
              <div key={i} style={{
                flex: 1, height: 4, borderRadius: 2, background: inactiveBg,
                position: "relative", overflow: "hidden"
              }}>
                {(done || active) && (
                  <div style={{
                    position: "absolute", inset: 0,
                    background: active && phase === "rest" ? C.rest : ac,
                    opacity: done ? 0.35 : 1,
                    transform: `scaleX(${progress})`,
                    transformOrigin: "left",
                    transition: active ? "transform 1s linear" : "transform 0.4s ease",
                    willChange: "transform"

                )}
              </div>
            );
          })}

      const sendMessage = async () => {
        const text = input.trim();

        setInput("");
        const userMsg = { role: "user", content: text };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
              "content-type": "application/json",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 2048,
              system: buildSystemPrompt(profile),
              messages: newMessages.map(m => ({ role: m.role, content: m.content })),
            }),
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error?.message || "API error " + res.status);
          }
          const data = await res.json();
          const content = data.content[0]?.text || "";
          const plan = extractPlan(content);
          setMessages(prev => [...prev, { role: "assistant", content, plan }]);

          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            position: "absolute", top: 24, right: 24,
            display: "flex", alignItems: "center", gap: 8,
            zIndex: 1000,
          }}
        >
          {hover && !mute && (
            <input 
              type="range" min="0" max="1" step="0.05" 
              value={vol} onChange={handleVolChange}
              aria-label="Volume"
              style={{ 
                width: 60, height: 4, borderRadius: 2, 
                appearance: "none", background: C.faintHover,
                cursor: "pointer", outline: "none"
              }}
            />
          )}
          <button 
            onClick={onToggle} 
            aria-label={mute ? "Unmute sound" : "Mute sound"}
            aria-pressed={mute}
            style={{
              background: "none", border: "none", color: C.muted,

              display: "flex", alignItems: "center", justifyContent: "center"
