    // ─── PLAN PLAYER ───────────────────────────────────────────────────
    // ─── ANIMATED COLON TIMER ──────────────────────────────────────────
    function AnimatedColonTimer({ seconds, color, squashed }) {
      const mins = Math.floor(seconds / 60);
      const secs = String(seconds % 60).padStart(2, "0");
      const fontSize = "clamp(80px, 20vw, 45vh)";

      const dotBase = {
        display: "block",
        width: "0.13em",
        height: "0.13em",
        borderRadius: "50%",
        background: color,
        transition: "width 0.14s cubic-bezier(0.2, 0, 0, 1), height 0.14s cubic-bezier(0.2, 0, 0, 1), border-radius 0.14s cubic-bezier(0.2, 0, 0, 1), transform 0.14s cubic-bezier(0.2, 0, 0, 1)",
      };
      const dotSquashed = {
        ...dotBase,
        width: "0.32em",
        height: "0.09em",
        borderRadius: "0.05em",
      };
      const dot = squashed ? dotSquashed : dotBase;

      return (
        <div style={{
          display: "flex", alignItems: "center",
          fontFamily: display, fontSize, fontWeight: 800,
          color, lineHeight: 0.9, letterSpacing: "-0.04em",
          fontVariantNumeric: "tabular-nums", userSelect: "none",
        }}>
          <span>{mins}</span>
          <div style={{
            display: "flex", flexDirection: "column", alignItems: "center",
            gap: "0.09em", margin: "0 0.04em 0.04em",
          }}>
            <span style={dot} />
            <span style={dot} />
          </div>
          <span>{secs}</span>
        </div>
      );
    }

    // ─── RUNNING SCREEN ────────────────────────────────────────────────
    function RunningScreen({ plan, si, t, step, done, exColor, treeTheme, isDark, onDark,
      timerColor, mutedOnBg, labelOnBg, particles, mute, setMute, onBack, onPause,
      paused, onResume, onSkip, onSetClick }) {

      const [squashed, setSquashed] = useState(false);
      const [hintVisible, setHintVisible] = useState(false);
      const hintTimer = useRef(null);
      const gesture = useRef({ startX: 0, startY: 0, time: 0 });

      useEffect(() => {
        const handleKeys = (e) => {
          if (e.code === "Space") {
            e.preventDefault();
            paused ? onResume() : onPause();
            haptic(10);
          } else if (e.key === "Escape") {
            onBack();
          } else if (e.key === "ArrowRight") {
            onSkip();
            haptic(15);
          }
        };
        window.addEventListener("keydown", handleKeys);
        return () => window.removeEventListener("keydown", handleKeys);
      }, [paused, onResume, onPause, onBack, onSkip]);

      // Unified gesture logic for desktop/mobile
      const handlePointerDown = (e) => {
        gesture.current = { startX: e.clientX, startY: e.clientY, time: Date.now() };
        if (paused) return;
        hintTimer.current = setTimeout(() => setHintVisible(true), 1500); 
      };

      const handlePointerUp = (e) => {
        clearTimeout(hintTimer.current);
        setHintVisible(false);
        setSquashed(false);

        const dx = e.clientX - gesture.current.startX;
        const dy = Math.abs(e.clientY - gesture.current.startY);
        const dt = Date.now() - gesture.current.time;

        // 1. Swipe Right (> 40px distance, primarily horizontal)
        if (dx > 40 && dx > dy * 1.5) {
          haptic([20, 30]);
          onBack();
          return;
        }

        // 2. Simple Tap (small movement, quick duration)
        if (Math.abs(dx) < 10 && dy < 10 && dt < 400) {
          haptic(10);
          paused ? onResume() : onPause();
        }
      };


      return (
        <div
          onPointerDown={handlePointerDown}
          onPointerUp={handlePointerUp}
          style={{ ...rootStyle, background: treeTheme.bg, alignItems: "center", justifyContent: "center", overflow: "hidden", cursor: "default", touchAction: "none" }}
        >
          {/* Tree — dims when paused */}
          <div style={{ position: "absolute", inset: 0, zIndex: 15, opacity: paused ? 0.15 : 1, transition: "opacity 0.4s ease", pointerEvents: "none", willChange: "opacity" }}>
            <TreeBackground
              exerciseKey={`${si}_${done}`}
              customTheme={treeTheme}
              duration={step.duration}
              growing={!paused}
              startCompleted={paused}
            />
          </div>
          <ParticleBurstLayer particles={particles} />

          {/* Top bar */}
          <div data-no-pause="true" style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 10 }}>
            <div style={{ padding: "20px 0 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
              <JourneyBar 
                steps={plan.steps} 
                currentIndex={si} 
                phase="running" 
                activeColor={exColor} 
                onDark={onDark} 
                currentTime={t} 
                totalTime={step.duration} 
              />
              <p style={{ 
                margin: 0, 
                fontFamily: display, 
                fontSize: paused ? 16 : 11, 
                fontWeight: 700, 
                color: paused ? (isDark ? "rgba(255,255,255,0.9)" : "rgba(0,0,0,0.8)") : labelOnBg, 
                letterSpacing: 2, 
                textTransform: "uppercase", 
                transition: "all 0.4s ease", 
                opacity: paused ? 0.35 : 0.85 
              }}>{step.name}</p>
            </div>
          </div>

          <button data-no-pause="true" onClick={onBack} aria-label="Go back to library" style={{ position: "absolute", top: 24, left: 24, background: "none", border: "none", color: mutedOnBg, cursor: "pointer", padding: 8, opacity: paused ? 0.4 : 0.7, zIndex: 100, transition: "all 0.2s ease", borderRadius: 12 }} onPointerEnter={(e) => e.currentTarget.style.background = isDark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)" } onPointerLeave={(e) => e.currentTarget.style.background = "none" }>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </button>
          <div data-no-pause="true"><SoundBtn mute={mute} onToggle={() => setMute(m => !m)} /></div>

          {/* Timer — slides up when paused */}
          <div style={{
            position: "relative", zIndex: 10,
            display: "flex", flexDirection: "column", alignItems: "center", gap: 20,
            opacity: 1,
            transform: paused ? "translateY(-15vh)" : "translateY(0)",
            transition: "transform 0.25s cubic-bezier(0.2, 0, 0, 1)",
            willChange: "transform",
            filter: "drop-shadow(0 2px 12px rgba(0,0,0,0.10))",
          }}>
            <AnimatedColonTimer seconds={t} color={timerColor} squashed={squashed || paused} />
            <SetDots 
              total={step.sets} 
              done={done} 
              color={exColor} 
              onDark={onDark} 
              onSetClick={(i) => {
                if (paused || phase === "running" || phase === "rest") {
                  haptic(20);
                  onSetClick && onSetClick(i);
                }
              }}
            />
          </div>

          {/* Tap-to-pause / resume hint */}
          <div style={{
            position: "absolute", bottom: 48, left: 0, right: 0, zIndex: 10,
            display: "flex", justifyContent: "center",
            opacity: hintVisible || paused ? 1 : 0,
            transition: "opacity 1.2s ease",
            pointerEvents: "none",
          }}>
            <p style={{ margin: 0, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", fontFamily: font, color: isDark ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.3)", transition: "opacity 0.4s ease" }}>
              {paused ? "tap to resume" : "tap to pause"}
            </p>
          </div>

          {/* ── Info Card (Paused) ── */}
          <div style={{
            position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 30,
            transform: paused ? "translateY(0)" : "translateY(110%)",
            transition: "transform 0.28s cubic-bezier(0.2, 0, 0, 1)",
            padding: "0 20px 88px",
            pointerEvents: "none",
            willChange: "transform",
            display: "flex", justifyContent: "center", width: "100%"
          }}>
            <div style={{
              background: isDark ? "rgba(10,5,20,0.30)" : "rgba(255,255,255,0.40)",
              backdropFilter: "blur(40px) saturate(160%)",
              WebkitBackdropFilter: "blur(40px) saturate(160%)",
              border: `1px solid ${isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"}`,
              borderRadius: 24, padding: "24px",
              position: "relative",
              pointerEvents: "auto",
              width: "100%", maxWidth: "min(600px, 85vw)",
            }}>
              <p style={{ margin: "0 0 8px", fontSize: 11, color: exColor, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700 }}>How to do it</p>
              <p style={{ margin: "0 0 20px", fontSize: 15, color: isDark ? "rgba(255,255,255,0.9)" : "rgba(0,0,0,0.85)", lineHeight: 1.6, fontWeight: 400 }}>{step.cue}</p>

              {step.why && (
                <>
                  <p style={{ margin: "0 0 6px", fontSize: 11, color: mutedOnBg, letterSpacing: 1, textTransform: "uppercase", fontWeight: 600 }}>Why this exercise</p>
                  <p style={{ margin: 0, fontSize: 14, color: isDark ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.6)", lineHeight: 1.5, fontStyle: "italic" }}>{step.why}</p>
                </>
              )}

              <div data-no-pause="true" style={{ position: "absolute", top: 16, right: 16 }}>
                <button onClick={onSkip} style={{ background: "none", border: "none", color: mutedOnBg, fontSize: 12, opacity: 0.7, padding: 8, cursor: "pointer", fontFamily: font }}>Skip</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── CTA SLAB ─────────────────────────────────────────────────────
    function CTASlab({ color, label, details, onLaunch, showSkip, onSkip, floods = true }) {
      const [pressed, setPressed] = useState(false);
      const [hovered, setHovered] = useState(false);
      const [flooding, setFlooding] = useState(false);
      const [flooded, setFlooded] = useState(false);
      
      const pressScale = useSpring(pressed ? 0.97 : 1, 800, 80);

      const handlePointerDown = () => setPressed(true);
      const handlePointerUp = () => {
        setPressed(false);
        if (floods) {
          setFlooding(true);
          setTimeout(() => {
            setFlooded(true);
            onLaunch();
          }, 300);
        } else {
          onLaunch();
        }
      };

      return (
        <div style={{ position: "relative", zIndex: 20, marginTop: "auto", width: "100%" }}>

          <div
            onPointerDown={handlePointerDown}
            onPointerUp={handlePointerUp}
            onPointerEnter={() => setHovered(true)}
            onPointerLeave={() => { setPressed(false); setHovered(false); }}
            style={{
              background: flooding ? color : (hovered ? `${color}12` : `${C.surface}60`),
              border: flooding ? "none" : `1px solid ${C.faintHover}`,
              position: flooding ? "fixed" : "relative",
              bottom: flooding ? 0 : "auto",
              left: flooding ? 0 : "auto",
              right: flooding ? 0 : "auto",
              minHeight: flooding ? "100vh" : 88,
              width: flooding ? "100vw" : "100%",
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: flooding ? 0 : "20px 28px",
              cursor: "pointer",
              transform: flooding ? "none" : `scale(${pressScale})`,
              transformOrigin: "center center",
              transition: flooding
                ? "height 0.28s cubic-bezier(0.4,0,0.2,1), background 0.1s ease"
                : "background 0.2s ease",
              overflow: "hidden",
              userSelect: "none", touchAction: "none",
              borderRadius: flooding ? 0 : 28,
            }}
          >
            {!flooding && (
              <>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <span style={{ fontFamily: display, fontSize: 18, fontWeight: 800, letterSpacing: "0.1em", textTransform: "uppercase", color }}>{label}</span>
                  {details && <span style={{ fontSize: 13, color: C.onBg }}>{details}</span>}
                </div>
                <div style={{ 
                  width: 44, height: 44, borderRadius: "50%", 
                  border: `1px solid ${color}40`, 
                  background: hovered ? `${color}25` : `${color}10`, 
                  display: "flex", alignItems: "center", justifyContent: "center", color,
                  transition: "background 0.2s ease"
                }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    function PlanPlayer({ plan, onBack: onBackProp, themeOverride }) {
      const PLAN = plan;
      const [si, setSi] = useState(0);
      const [set, setSet] = useState(1);
      const [done, setDone] = useState(0);
      const [t, setT] = useState(PLAN.steps[0].duration);
      const [restT, setRestT] = useState(0);
      const [phase, setPhase] = useState("idle");
      const [mute, setMute] = useState(false);
      const [logged, setLogged] = useState(false);
      const [notionPageId, setNotionPageId] = useState(null);
      const [startTime, setStartTime] = useState(null);
      const [showConfetti, setShowConfetti] = useState(false);
      const [streak, setStreak] = useState(0);
      const [countdownT, setCountdownT] = useState(0);
      const [skipHover, setSkipHover] = useState(false);
      const iv = useRef(null);
      const cdRef = useRef(null);
      const step = PLAN.steps[si];
      const exColor = exerciseColor(si);
      const currentShape = shapeName(set - 1);
      const [particles, triggerBurst] = useParticleBurst();
      const sfx = useCallback((fn) => { if (!mute) fn(); }, [mute]);

      const totalSecs = calcTotalSecs(PLAN.steps);
      const prevSecs = PLAN.steps.slice(0, si).reduce((a, s) => a + s.duration * s.sets + s.restBetweenSets * Math.max(0, s.sets - 1), 0);
      const curSecs = done * step.duration + (phase === "running" ? step.duration - t : 0) + done * step.restBetweenSets;
      const overall = Math.min(1, (prevSecs + curSecs) / totalSecs);

      // Time remaining estimate
      const elapsedSecs = prevSecs + curSecs;
      const remainingSecs = totalSecs - elapsedSecs;

      // Nudge category based on progress
      const nudgeCategory = overall < 0.1 ? "start" : overall < 0.5 ? "start" : overall < 0.8 ? "midway" : "almostDone";
      const [currentNudge] = useState(() => getNudge("start"));

      const [showConfirmBack, setShowConfirmBack] = useState(false);

      const onBack = () => {
        if (["running", "rest", "paused", "countdown"].includes(phase)) {
          setShowConfirmBack(true);
        } else {
          onBackProp();
        }
      };

      useEffect(() => {
        const handleVis = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
        document.addEventListener('visibilitychange', handleVis);
        requestWakeLock();
        return () => { document.removeEventListener('visibilitychange', handleVis); releaseWakeLock(); };
      }, []);

      useEffect(() => {
        clearInterval(iv.current);
        if (showConfirmBack) return; // Freeze while dialog is open

        if (phase === "running") {
          if (!startTime) setStartTime(Date.now());
          const targetEndTime = Date.now() + t * 1000;
          iv.current = setInterval(() => {
            setT(prev => {
              const remaining = Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
              if (remaining <= 0) {
                clearInterval(iv.current);
                const nd = done + 1;
                haptic([40, 20, 40]);
                if (nd >= step.sets) { sfx(sfxEngine.exDone); setDone(nd); setPhase("exDone"); }
                else { sfx(sfxEngine.setDone); triggerBurst(exColor); setDone(nd); setRestT(step.restBetweenSets); setPhase("rest"); }
                return 0;
              }
              if (remaining <= 4 && remaining < prev) { sfx(sfxEngine.beep); haptic(10); }
              else if ((remaining - 1) % 10 === 0 && remaining < prev) { sfx(sfxEngine.tick); haptic(5); }
              return remaining;
            });
          }, 1000);
        } else if (phase === "rest") {
          const targetEndTime = Date.now() + restT * 1000;
          iv.current = setInterval(() => {
            setRestT(prev => {
              const remaining = Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
              if (remaining <= 0) { clearInterval(iv.current); sfx(sfxEngine.ready); setSet(s => s + 1); setT(step.duration); setPhase("running"); return 0; }
              if (remaining <= 4 && remaining < prev) sfx(sfxEngine.beep);
              return remaining;
            });
          }, 1000);
        } else if (phase === "countdown") {
          const targetEndTime = Date.now() + countdownT * 1000;
          iv.current = setInterval(() => {
            const remaining = Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
            if (remaining <= 0) { clearInterval(iv.current); sfx(sfxEngine.ready); setPhase("running"); }
            else {
              setCountdownT(prev => {
                if (remaining < prev) sfx(sfxEngine.beep);
                return remaining;
              });
            }
          }, 1000);
        }
        return () => clearInterval(iv.current);
      }, [phase, showConfirmBack]);

      // Log to Notion when workout completes
      useEffect(() => {
        if (phase === "allDone" && !logged) {
          setLogged(true);
          setShowConfetti(true);
          const s = incrementStreak();
          setStreak(s);
          logWorkout(PLAN).then(pageId => setNotionPageId(pageId));
        }
      }, [phase, logged]);

      const start = () => { sfx(sfxEngine.ready); setPhase("running"); };
      const startCountdown = () => {
        sfx(sfxEngine.tick);
        setCountdownT(3);
        setPhase("countdown");
      };
      const pause = () => { clearInterval(iv.current); setPhase("paused"); };
      const resume = () => { sfx(sfxEngine.ready); setPhase("running"); };
      const skipRest = () => { clearInterval(iv.current); sfx(sfxEngine.ready); haptic(20); setSet(s => s + 1); setT(step.duration); setPhase("running"); };
      const next = () => {
        clearInterval(iv.current);
        haptic(30);
        if (si < PLAN.steps.length - 1) {
          const n = si + 1; setSi(n); setSet(1); setDone(0); setT(PLAN.steps[n].duration); setPhase("idle");
        } else { sfx(sfxEngine.allDone); setPhase("allDone"); }
      };
      const reset = () => { clearInterval(iv.current); clearInterval(cdRef.current); setSi(0); setSet(1); setDone(0); setT(PLAN.steps[0].duration); setPhase("idle"); setLogged(false); setNotionPageId(null); setStartTime(null); setShowConfetti(false); };

      const handleNotesSave = async (notes) => { await saveSessionNotes({ notionPageId, ...notes }); setPhase("done"); };
      const handleNotesSkip = () => setPhase("done");

      const handleSetClick = (setIndex) => {
        if (setIndex === done) return;
        setDone(setIndex);
        setSet(setIndex + 1);
        setT(step.duration);
        setPhase("idle"); 
      };

      const elapsedMinutes = startTime ? Math.round((Date.now() - startTime) / 60000) : 0;

      const renderPhase = () => {
      // ─── SCREEN: Session Notes ─────────────────────────
      if (phase === "sessionNotes") return <SessionNotesScreen planTitle={PLAN.title} onSave={handleNotesSave} onSkip={handleNotesSkip} />;

      // ─── SCREEN: Final Done ────────────────────────────
      if (phase === "done") return (
        <div style={{ ...rootStyle, alignItems: "center", justifyContent: "center" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 20, padding: "0 32px", textAlign: "center" }}>
            <AnimatedCheck size={56} color={EXERCISE_COLORS[3]} />
            <div>
              <h1 style={{ margin: 0, fontFamily: display, fontSize: 32, fontWeight: 800, color: C.onBg, letterSpacing: -1, lineHeight: 1.1 }}>Session logged</h1>
              <p style={{ margin: "8px 0 0", fontSize: 13, color: C.muted, lineHeight: 1.6 }}>Saved to Notion. See you next time.</p>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <Btn onClick={reset} variant="tonal">Start over</Btn>
              <Btn onClick={onBack} variant="text">Library</Btn>
            </div>
          </div>
        </div>
      );

      // ─── SCREEN: All Done (Power of Moments: peak-end elevation) ───
      if (phase === "allDone") return (
        <div style={{ ...rootStyle, alignItems: "center", justifyContent: "center" }}>
          <Confetti active={showConfetti} />
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 24, padding: "0 32px", textAlign: "center" }}>
            {/* Stats row */}
            <div style={{ display: "flex", gap: 32, marginBottom: 8, animation: "fadeUp 0.5s ease 0.2s both" }}>
              {[
                { val: PLAN.steps.length, label: "exercises" },
                { val: elapsedMinutes || Math.round(totalSecs / 60), label: "minutes" },
                { val: PLAN.steps.reduce((a, s) => a + s.sets, 0), label: "sets" },
              ].map((stat, i) => (
                <div key={i} style={{ textAlign: "center" }}>
                  <p style={{ margin: 0, fontFamily: display, fontSize: 48, fontWeight: 800, color: EXERCISE_COLORS[i % EXERCISE_COLORS.length], letterSpacing: -2, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{stat.val}</p>
                  <p style={{ margin: "4px 0 0", fontSize: 11, color: C.muted, letterSpacing: 0.5, textTransform: "uppercase" }}>{stat.label}</p>
                </div>
              ))}
            </div>

            <div style={{ animation: "fadeUp 0.5s ease 0.4s both" }}>
              <h1 style={{ margin: 0, fontFamily: display, fontSize: 32, fontWeight: 800, color: C.onBg, letterSpacing: -1, lineHeight: 1.1 }}>
                {getNudge("done")}
              </h1>
              {streak > 1 && (
                <p style={{ margin: "10px 0 0", fontSize: 14, color: C.accent, fontWeight: 500 }}>
                  🔥 {streak} day streak — keep it going
                </p>
              )}
            </div>

            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, marginTop: 8, animation: "fadeUp 0.5s ease 0.6s both" }}>
              <M3EPillBtn onClick={() => setPhase("sessionNotes")} color={EXERCISE_COLORS[3]}>How'd it go?</M3EPillBtn>
              <Btn variant="text" onClick={handleNotesSkip} style={{ fontSize: 12, opacity: 0.6 }}>Skip</Btn>
            </div>
          </div>
        </div>
      );

      // ─── SCREEN: Rest ──────────────────────────────────
      const treeTheme = useMemo(() => makeTreeTheme(exColor, themeOverride), [exColor, themeOverride]);
      const isDark = !treeTheme.light;
      const onDark = isDark;
      const timerColor = isDark ? "rgba(255,255,255,0.92)" : C.onBg;
      const mutedOnBg = isDark ? "rgba(255,255,255,0.45)" : C.muted;
      const labelOnBg = isDark ? "rgba(255,255,255,0.70)" : exColor;

      if (phase === "rest") return (
        <div style={{ ...rootStyle, background: treeTheme.bg, alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
          {/* Fully-grown tree — gently swaying */}
          <div style={{ position: "absolute", inset: 0, zIndex: 15, pointerEvents: "none" }}>
            <TreeBackground
              exerciseKey={`${si}_${done}`}
              customTheme={treeTheme}
              duration={step.duration}
              growing={false}
              startCompleted={true}
            />
          </div>
          {/* Soft rest-mode tint overlay */}
          <div style={{ position: "absolute", inset: 0, background: isDark ? "rgba(100,60,180,0.07)" : "rgba(199,125,255,0.06)", zIndex: 1, pointerEvents: "none" }} />

          <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "20px 0 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 12, zIndex: 10 }}>
            <JourneyBar 
              steps={PLAN.steps} 
              currentIndex={si} 
              phase="rest" 
              activeColor={exColor} 
              onDark={onDark} 
              currentTime={restT} 
              totalTime={step.restBetweenSets} 
            />
          </div>
          <button onClick={onBack} style={{ position: "absolute", top: 20, left: 20, background: "none", border: "none", color: mutedOnBg, fontSize: 13, cursor: "pointer", padding: 8, opacity: 0.7, fontFamily: font, zIndex: 20 }}>← Back</button>
          <SoundBtn mute={mute} onToggle={() => setMute(m => !m)} />

          <div style={{ position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 16, animation: "fadeIn 0.3s ease both" }}>
            <p style={{ margin: 0, fontSize: 11, color: isDark ? "rgba(199,125,255,0.9)" : C.rest, letterSpacing: 2, textTransform: "uppercase", fontWeight: 700 }}>
              Rest · set {done} of {step.sets}
            </p>
            <span style={{
              fontFamily: display, fontSize: "clamp(100px, 25vw, 50vh)", fontWeight: 800,
              color: isDark ? "rgba(255,255,255,0.88)" : C.rest,
              lineHeight: 0.9, letterSpacing: "-0.04em",
              fontVariantNumeric: "tabular-nums",
            }}>{restT}<span style={{ fontSize: "0.3em", fontWeight: 600 }}>s</span></span>

            <p style={{ margin: 0, fontSize: 14, color: mutedOnBg, textAlign: "center" }}>{getNudge("rest")}</p>
            <Btn variant="text" onClick={skipRest} style={{ fontSize: 13, color: isDark ? "rgba(199,125,255,0.9)" : C.rest, marginTop: 8 }}>Skip rest →</Btn>
          </div>
        </div>
      );

      // ─── SCREEN: Countdown (get into position) ─────────
      if (phase === "countdown") return (
        <div style={{ ...rootStyle, background: treeTheme.bg, alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
          {/* Tree already growing beneath — will be revealed when flood fades */}
          <div style={{ position: "absolute", inset: 0, zIndex: 15, pointerEvents: "none" }}>
            <TreeBackground
              exerciseKey={`${si}_${done}`}
              customTheme={treeTheme}
              duration={step.duration * 8}
              growing={true}
              startCompleted={false}
            />
          </div>

          {/* Flood color overlay — fades out on final beat (countdownT === 1) */}
          <div style={{
            position: "absolute", inset: 0, background: exColor, zIndex: 5,
            opacity: countdownT === 1 ? 0 : 1,
            transition: countdownT === 1 ? "opacity 0.65s ease" : "none",
            pointerEvents: "none",
          }} />

          {/* Journey bar sits above the flood */}
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "20px 0 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 10, zIndex: 10 }}>
            <JourneyBar 
              steps={PLAN.steps} 
              currentIndex={si} 
              phase="running" 
              activeColor={exColor} 
              onDark={onDark} 
              currentTime={3} 
              totalTime={3} 
            />
          </div>
          <SoundBtn mute={mute} onToggle={() => setMute(m => !m)} />

          {/* Countdown number — white while flood is solid, adapts as it fades */}
          <div style={{ position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            <span
              key={countdownT}
              style={{
                fontFamily: display, fontSize: "clamp(120px, 35vw, 60vh)", fontWeight: 800,
                color: countdownT === 1 ? timerColor : "#fff",
                lineHeight: 0.85, fontVariantNumeric: "tabular-nums",
                transition: "color 0.4s ease",
                animation: "springIn 0.45s cubic-bezier(0.2, 0, 0, 1) both",
              }}>{countdownT}</span>
            <p style={{
              margin: 0, fontFamily: display, fontSize: 16, fontWeight: 700,
              color: countdownT === 1 ? labelOnBg : "rgba(255,255,255,0.75)",
              letterSpacing: 2, textTransform: "uppercase",
              transition: "color 0.4s ease",
              animation: "fadeIn 0.4s ease 0.1s both",
            }}>{step.name}</p>
          </div>
        </div>
      );

      // ─── SCREEN: Idle (pre-exercise — instruction-first) ───────────
      if (phase === "idle") {
        return (
        <div style={{ ...rootStyle, background: C.bg, overflow: "hidden" }}>
          {/* Active Tree — prominent on the right for desktop */}
          <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: "50%", opacity: 0.9, pointerEvents: "none", zIndex: 0, transform: "translateX(10%)" }}>
            <TreeBackground
              exerciseKey={`${si}_${done}`} customTheme={treeTheme}
              duration={1} growing={true} startCompleted={true}
            />
          </div>

          <SoundBtn mute={mute} onToggle={() => setMute(m => !m)} />

          <div style={{ display: "flex", height: "100%", paddingTop: "min(20px, 4vh)", paddingBottom: 24, margin: 0, paddingLeft: "min(24px, 4vw)", position: "relative", zIndex: 1, width: "100%" }}>
            {/* Timeline Column */}
            <div style={{ width: "clamp(60px, 12vw, 80px)", flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 8 }}>
              <button 
                onClick={onBack} 
                aria-label="Go back to library"
                style={{ 
                  background: "none", border: "none", color: C.muted, 
                  cursor: "pointer", padding: "8px 12px", marginBottom: "min(24px, 3vh)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  borderRadius: 12, transition: "background 0.2s"
                }}
                onPointerEnter={(e) => e.currentTarget.style.background = C.faint}
                onPointerLeave={(e) => e.currentTarget.style.background = "none"}
                title="Go Back"
              >
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              </button>

              {PLAN.steps.map((s, i) => {
                if (i < si) return null;
                if (i > si + 2) return null;
                const isCurrent = i === si;
                const bg = isCurrent ? `${exColor}25` : "transparent";
                return (
                  <React.Fragment key={i}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: bg, display: "flex", alignItems: "center", justifyContent: "center", color: exColor, zIndex: 2 }}>
                      {getIcon(s.emoji) ? (
                        <span className="material-icons" style={{ fontSize: 20 }}>{getIcon(s.emoji)}</span>
                      ) : (
                        <span style={{ fontSize: 18 }}>{s.emoji}</span>
                      )}
                    </div>
                    {i < Math.min(si + 2, PLAN.steps.length - 1) && (
                      <div style={{ width: 2, height: 32, background: `repeating-linear-gradient(to bottom, ${C.faint} 0, ${C.faint} 4px, transparent 4px, transparent 8px)`, margin: "4px 0" }} />
                    )}
                  </React.Fragment>
                );
              })}
            </div>

            {/* Content Column */}
            <div style={{ flex: 1, paddingRight: "min(24px, 4vw)", overflowY: "auto", display: "flex", flexDirection: "column", maxWidth: 520 }}>
              <div style={{ animation: "fadeUp 0.4s ease both", marginBottom: 24 }}>
                <p style={{ color: exColor, fontSize: 13, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, marginTop: 12 }}>
                  {si + 1} OF {PLAN.steps.length} · {fmtMins(remainingSecs)} LEFT
                </p>
                <h1 style={{ fontSize: "clamp(28px, 9vw, 52px)", fontWeight: 800, color: C.onBg, lineHeight: 1.05, letterSpacing: -1.5, fontFamily: display, marginBottom: 12 }}>
                  {step.name}
                </h1>

                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  <span style={{ fontSize: 13, color: exColor, fontWeight: 600, background: exColor+"18", padding: "6px 14px", borderRadius: 100 }}>
                    {step.sets} sets × {fmt(step.duration)}
                  </span>
                  {step.restBetweenSets > 0 && step.sets > 1 && (
                    <span style={{ fontSize: 13, color: C.rest, fontWeight: 600, background: C.restDim, padding: "6px 14px", borderRadius: 100 }}>
                      {step.restBetweenSets}s rest
                    </span>
                  )}
                  {step.meta && (
                    <span style={{ fontSize: 13, color: C.muted, fontWeight: 600, background: C.faint, padding: "6px 14px", borderRadius: 100 }}>
                      {step.meta}
                    </span>
                  )}
                </div>
              </div>

              <div style={{ background: C.surface, borderRadius: 24, padding: "16px 20px", marginBottom: 16, animation: "fadeUp 0.4s ease 0.1s both" }}>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: exColor, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>How to do it</p>
                <div style={{ position: "relative" }}>
                  <p style={{ 
                    margin: 0, fontSize: 16, color: C.onBg, lineHeight: 1.55,
                    overflow: "hidden", 
                    display: "-webkit-box",
                    WebkitBoxOrient: "vertical",
                    WebkitLineClamp: 4, // Default collapsed
                  }} id={`cue-${si}`}>
                    {step.cue}
                  </p>
                  {step.cue && step.cue.length > 160 && (
                    <button 
                      onClick={(e) => {
                        const p = e.currentTarget.previousSibling;
                        const isExpanded = p.style.display === "block";
                        p.style.display = isExpanded ? "-webkit-box" : "block";
                        e.currentTarget.innerText = isExpanded ? "Read more" : "Show less";
                      }}
                      style={{ background: "none", border: "none", color: exColor, fontSize: 11, fontWeight: 700, padding: "8px 0 0", cursor: "pointer", textTransform: "uppercase" }}
                    >
                      Read more
                    </button>
                  )}
                </div>
                
                {step.why && (
                  <>
                    <div style={{ height: 1, background: C.faintHover, margin: "20px 0" }} />
                    <p style={{ margin: "0 0 8px", fontSize: 12, color: C.muted, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Why this exercise</p>
                    <p style={{ margin: 0, fontSize: 14, color: C.muted, fontStyle: "italic", lineHeight: 1.45 }}>{step.why}</p>
                  </>
                )}
              </div>

              <div style={{ marginBottom: 24 }}>
                <CTASlab
                  color={exColor}
                  label={done > 0 ? "Resume" : "Begin"}
                  details={`${step.sets} sets · ${fmt(step.duration)} each`}
                  onLaunch={startCountdown}
                  floods={true}
                />
              </div>

              {/* Enhanced Footer: Next + Skip */}
              {si < PLAN.steps.length - 1 && (
                <div style={{
                  marginTop: "auto",
                  paddingTop: 32,
                  display: "flex", 
                  alignItems: "center", 
                  gap: 16, 
                  fontSize: 12, 
                  color: C.muted,
                  animation: "fadeUp 0.4s ease 0.3s both"
                }}>
                  <div style={{ 
                    display: "flex", 
                    alignItems: "center", 
                    gap: 10,
                    background: C.surface,
                    padding: "8px 16px 8px 12px",
                    borderRadius: 100,
                    border: `1px solid ${C.faintHover}`
                  }}>
                    {getIcon(PLAN.steps[si + 1].emoji) ? (
                      <span className="material-icons" style={{ fontSize: 18, color: C.muted }}>{getIcon(PLAN.steps[si + 1].emoji)}</span>
                    ) : (
                      <span style={{ fontSize: 18, filter: "grayscale(0.2)" }}>{PLAN.steps[si + 1].emoji}</span>
                    )}
                    <span style={{ letterSpacing: 0.3 }}>
                      <span style={{ opacity: 0.6, fontSize: 11, fontWeight: 700, textTransform: "uppercase", marginRight: 8 }}>Next</span>
                      <b style={{ color: C.onBg, fontWeight: 700 }}>{PLAN.steps[si + 1].name}</b>
                    </span>
                  </div>
                  
                  <button 
                    onClick={next} 
                    onPointerEnter={() => setSkipHover(true)}
                    onPointerLeave={() => setSkipHover(false)}
                    style={{ 
                      background: skipHover ? `${exColor}15` : "none", 
                      border: "none", 
                      color: exColor, 
                      fontSize: 11, 
                      fontWeight: 800, 
                      cursor: "pointer", 
                      padding: "8px 16px", 
                      borderRadius: 100,
                      textTransform: "uppercase", 
                      letterSpacing: 1,
                      transition: "all 0.2s ease",
                      display: "flex",
                      alignItems: "center",
                      gap: 6
                    }}
                  >
                    Skip
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: skipHover ? 1 : 0.6, transform: `translateX(${skipHover ? "2px" : "0"})`, transition: "all 0.2s ease" }}><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
        );
      }

      // ─── SCREEN: Running (the hero screen) ─────────────────────────
      if (phase === "running") return (
        <RunningScreen
          plan={PLAN} si={si} t={t} step={step} done={done}
          exColor={exColor} treeTheme={treeTheme} isDark={isDark} onDark={onDark}
          timerColor={timerColor} mutedOnBg={mutedOnBg} labelOnBg={labelOnBg}
          particles={particles} mute={mute} setMute={setMute}
          onBack={onBack} onPause={pause} paused={false}
          onSetClick={handleSetClick}
        />
      );

      if (phase === "paused") return (
        <RunningScreen
          plan={PLAN} si={si} t={t} step={step} done={done}
          exColor={exColor} treeTheme={treeTheme} isDark={isDark} onDark={onDark}
          timerColor={timerColor} mutedOnBg={mutedOnBg} labelOnBg={labelOnBg}
          particles={[]} mute={mute} setMute={setMute}
          onBack={onBack} onPause={pause} paused={true}
          onResume={resume} onSkip={next}
          onSetClick={handleSetClick}
        />
      );

      // ─── SCREEN: Exercise Done (pride moment) ──────────
      if (phase === "exDone") {
        const isLast = si >= PLAN.steps.length - 1;
        const doneCount = si + 1;
        const totalCount = PLAN.steps.length;
        const nextColor = !isLast ? exerciseColor(si + 1) : EXERCISE_COLORS[3];
        return (
          <div style={{ ...rootStyle, background: treeTheme.bg, alignItems: "center", justifyContent: "center" }}>
            {/* Completed tree — glowing behind the check */}
            <div style={{ position: "absolute", inset: 0, opacity: isDark ? 0.55 : 0.2, pointerEvents: "none", zIndex: 0 }}>
              <TreeBackground
                exerciseKey={`${si}_${done}`}
                customTheme={treeTheme}
                duration={1}
                growing={false}
                startCompleted={true}
              />
            </div>
            {/* Gradient vignette so text stays readable */}
            <div style={{
              position: "absolute", inset: 0, background: isDark
                ? "radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 70%)"
                : "radial-gradient(ellipse at center, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.15) 70%)",
              zIndex: 1, pointerEvents: "none"
            }} />

            <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "20px 0 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 10, zIndex: 10 }}>
              <JourneyBar steps={PLAN.steps} currentIndex={si + 1} phase="idle" activeColor={exColor} onDark={onDark} />
            </div>
            <button onClick={onBack} style={{ position: "absolute", top: 20, left: 20, background: "none", border: "none", color: mutedOnBg, fontSize: 13, cursor: "pointer", padding: 8, opacity: 0.7, fontFamily: font, zIndex: 20 }}>← Back</button>
            <SoundBtn mute={mute} onToggle={() => setMute(m => !m)} />

            <div style={{ position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 20, padding: "0 32px", textAlign: "center" }}>
              <AnimatedCheck size={52} color={isDark ? "rgba(255,255,255,0.9)" : exColor} />

              <div style={{ animation: "fadeUp 0.4s ease 0.2s both" }}>
                <h2 style={{ margin: 0, fontSize: 28, fontWeight: 800, color: timerColor, letterSpacing: -0.8, fontFamily: display }}>{step.name}</h2>
                <p style={{ margin: "6px 0 0", fontSize: 13, color: isDark ? "rgba(255,255,255,0.55)" : exColor, fontWeight: 600 }}>
                  {doneCount} of {totalCount} done
                </p>
              </div>

              {!isLast ? (
                <div style={{ animation: "fadeUp 0.4s ease 0.4s both", display: "flex", flexDirection: "column", alignItems: "center", gap: 16, width: "100%", maxWidth: 1000 }}>
                  {/* Next exercise peek */}
                  <div style={{ padding: "24px 28px", background: isDark ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.6)", backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", borderRadius: 28, border: `1px solid ${isDark ? "rgba(255,255,255,0.1)" : "rgba(26,26,26,0.05)"}`, width: "100%", maxWidth: 880 }}>
                    <p style={{ margin: "0 0 16px", fontSize: 12, color: mutedOnBg, letterSpacing: 1.5, fontWeight: 700, textTransform: "uppercase", textAlign: "left" }}>Up next</p>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{ position: "relative", width: 56, height: 56, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: nextColor }}>
                        <M3EChipCanvas width={56} height={56} color={nextColor} opacity={0.15} border={0} />
                        {getIcon(PLAN.steps[si + 1].emoji) ? (
                          <span className="material-icons" style={{ fontSize: 28, position: "relative" }}>{getIcon(PLAN.steps[si + 1].emoji)}</span>
                        ) : (
                          <span style={{ fontSize: 24, position: "relative" }}>{PLAN.steps[si + 1].emoji}</span>
                        )}
                      </div>
                      <div style={{ textAlign: "left" }}>
                        <p style={{ margin: "0 0 4px", fontSize: 18, color: timerColor, fontWeight: 700, fontFamily: display, letterSpacing: "-0.01em" }}>{PLAN.steps[si + 1].name}</p>
                        <p style={{ margin: 0, fontSize: 14, color: mutedOnBg, fontWeight: 500 }}>{PLAN.steps[si + 1].sets} sets × {fmt(PLAN.steps[si + 1].duration)}</p>
                      </div>
                    </div>
                  </div>
                  <div style={{ width: "100%", maxWidth: 880 }}>
                    <CTASlab 
                      color={nextColor} 
                      label="Continue" 
                      details={`Ready for ${PLAN.steps[si+1].name}?`}
                      onLaunch={next} 
                      floods={false}
                    />
                  </div>
                </div>
              ) : (
                <div style={{ animation: "fadeUp 0.4s ease 0.4s both", width: "100%", maxWidth: 880 }}>
                  <CTASlab 
                    color={EXERCISE_COLORS[3]} 
                    label="Finish workout" 
                    details="Great work today."
                    onLaunch={next} 
                    floods={false}
                  />
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
      }; // end renderPhase

      const transitionKey = `${phase === "paused" ? "running" : phase}-${si}-${done}`;
      return (
        <>
          <Dialog 
            open={showConfirmBack} 
            title="End workout?" 
            message="Your progress for this session will be lost." 
            onConfirm={onBackProp} 
            onCancel={() => setShowConfirmBack(false)} 
            confirmLabel="End Workout"
            confirmColor={C.danger}
          />
          <ScreenTransition transitionKey={transitionKey}>
            {renderPhase()}
          </ScreenTransition>
        </>
      );
    }

    // ─── TRANSITIONS ───────────────────────────────────────────────────
    function ScreenTransition({ transitionKey, children, style, duration = 250 }) {
      const [screens, setScreens] = useState([{ key: transitionKey, content: children }]);
      
      useEffect(() => {
        setScreens(prev => {
          if (prev.length > 0 && prev[prev.length - 1].key === transitionKey) {
            const updated = [...prev];
            updated[updated.length - 1].content = children;
            return updated;
          }
          return [...prev, { key: transitionKey, content: children, isEntering: true }];
        });
        
        const timer = setTimeout(() => {
          setScreens(prev => prev.filter(s => s.key === transitionKey));
        }, duration);
        
        return () => clearTimeout(timer);
      }, [transitionKey, children, duration]);
      
      return (
        <div style={{ position: "relative", width: "100%", height: "100%", ...style }}>
          {screens.map(screen => {
            const isCurrent = screen.key === transitionKey;
            return (
              <div
                key={screen.key}
                style={{
                  position: "absolute", inset: 0,
                  opacity: isCurrent ? 1 : 0,
                  transition: `opacity ${duration}ms ease`,
                  pointerEvents: isCurrent ? "auto" : "none",
                  zIndex: isCurrent ? 1 : 0,
                }}
              >
                {screen.content}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── APP ROOT ──────────────────────────────────────────────────────
    function App() {
      const [activePlan, setActivePlan] = useState(null);
      const [manualTheme, setManualTheme] = useState("auto"); // "auto", "light", "dark"
      
      const themeOverride = useMemo(() => {
        if (manualTheme === "auto") return null;
        return manualTheme;
      }, [manualTheme]);

      return (
        <div style={{ width: "100%", height: "100%", background: "#1a1a1b", display: "flex", alignItems: "center", justifyContent: "center", padding: "clamp(0px, 2vh, 24px) clamp(0px, 2vw, 24px)" }}>
          <div style={{ width: "100%", height: "100%", maxWidth: "100%", maxHeight: "100%", background: "#fff", borderRadius: 32, overflow: "hidden", display: "flex", boxShadow: "0 40px 100px rgba(0,0,0,0.6)", position: "relative" }}>
            <ScreenTransition transitionKey={activePlan ? "player" : "library"}>
              {!activePlan ? (
                <Library onSelect={setActivePlan} manualTheme={manualTheme} setManualTheme={setManualTheme} />
              ) : (
                <PlanPlayer plan={activePlan} themeOverride={themeOverride} onBack={() => setActivePlan(null)} />
              )}
            </ScreenTransition>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
